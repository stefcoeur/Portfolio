<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>matchamap — find the best matcha in your city</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7faf3; min-height: 100vh; display: flex; flex-direction: column; }

.browser-header { background: #fff; border-bottom: 1px solid #e0edcc; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.logo-row { display: flex; align-items: center; gap: 10px; }
.wordmark { font-size: 22px; font-weight: 600; color: #27500A; }
.wordmark span { color: #3B6D11; }
.tagline { font-size: 12px; color: #97C459; margin-top: 2px; }
.nav-links { display: flex; gap: 20px; align-items: center; }
.nav-link { font-size: 14px; color: #639922; font-weight: 500; cursor: pointer; padding: 6px 0; border-bottom: 2px solid transparent; transition: all 0.15s; }
.nav-link.active { color: #27500A; border-bottom-color: #3B6D11; }
.nav-cta { background: #3B6D11; color: #EAF3DE; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 999px; cursor: pointer; border: none; transition: background 0.15s; }
.nav-cta:hover { background: #27500A; }

.search-bar { background: #fff; border-bottom: 1px solid #e0edcc; padding: 12px 20px; display: flex; gap: 12px; align-items: center; }
.search-pill { flex: 1; max-width: 400px; display: flex; align-items: center; background: #f7faf3; border: 2px solid #C0DD97; border-radius: 999px; padding: 9px 16px; gap: 10px; }
.search-pill input { border: none; outline: none; background: transparent; font-size: 14px; color: #27500A; width: 100%; }
.search-pill input::placeholder { color: #97C459; }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { font-size: 12px; font-weight: 500; padding: 7px 16px; border-radius: 999px; border: 2px solid #C0DD97; background: #fff; color: #639922; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-btn.active { background: #3B6D11; color: #EAF3DE; border-color: #3B6D11; }
.filter-btn:hover:not(.active) { border-color: #97C459; }

.main { display: flex; flex: 1; height: calc(100vh - 118px); }

.map-container { flex: 1; background: #e8f4df; position: relative; overflow: hidden; }
.map-container svg { width: 100%; height: 100%; }
.map-tooltip { position: absolute; background: #fff; border: 2px solid #C0DD97; border-radius: 16px; padding: 10px 14px; min-width: 170px; pointer-events: none; display: none; z-index: 10; }
.map-tooltip.show { display: block; }
.tip-name { font-size: 13px; font-weight: 600; color: #27500A; }
.tip-type { font-size: 11px; color: #97C459; margin-top: 2px; }
.tip-rating { font-size: 12px; color: #3B6D11; font-weight: 600; margin-top: 4px; }
.tip-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.tip-tag { font-size: 10px; background: #EAF3DE; color: #3B6D11; padding: 2px 8px; border-radius: 999px; }

.sidebar { width: 380px; background: #fff; border-left: 1px solid #e0edcc; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sidebar-tabs { display: flex; border-bottom: 1px solid #e0edcc; padding: 0 16px; }
.sidebar-tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 500; color: #97C459; border-bottom: 2.5px solid transparent; cursor: pointer; transition: all 0.15s; }
.sidebar-tab.active { color: #3B6D11; border-bottom-color: #3B6D11; }
.sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }
.sidebar-content::-webkit-scrollbar { width: 4px; }
.sidebar-content::-webkit-scrollbar-thumb { background: #C0DD97; border-radius: 999px; }

.cafe-card { background: #fff; border: 2px solid #C0DD97; border-radius: 18px; padding: 14px 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s, transform 0.12s; }
.cafe-card:hover { border-color: #3B6D11; transform: translateY(-1px); }
.cafe-card.featured { border-color: #3B6D11; background: #f7faf3; }
.cafe-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.cafe-name { font-size: 14px; font-weight: 600; color: #27500A; }
.cafe-type { font-size: 11px; color: #97C459; margin-top: 2px; }
.cafe-badge { background: #3B6D11; color: #EAF3DE; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
.cafe-meta { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.meta-pill { font-size: 11px; background: #EAF3DE; color: #3B6D11; padding: 3px 10px; border-radius: 999px; font-weight: 500; }
.drink-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.drink-tag { font-size: 10px; background: #f7faf3; color: #639922; border: 1.5px solid #C0DD97; padding: 2px 9px; border-radius: 999px; }

.rank-card { display: flex; align-items: center; gap: 12px; background: #fff; border: 2px solid #C0DD97; border-radius: 18px; padding: 12px 16px; margin-bottom: 10px; }
.rank-num { font-size: 20px; font-weight: 600; color: #C0DD97; min-width: 32px; text-align: center; }
.rank-num.top { color: #BA7517; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 13px; font-weight: 600; color: #27500A; }
.rank-sub { font-size: 11px; color: #97C459; margin-top: 2px; }
.rank-bar { height: 3px; background: #EAF3DE; border-radius: 999px; margin-top: 6px; overflow: hidden; }
.rank-bar-fill { height: 100%; background: #3B6D11; border-radius: 999px; }
.rank-score { font-size: 20px; font-weight: 600; color: #3B6D11; }

.review-btn { width: 100%; padding: 12px; background: #3B6D11; border: none; border-radius: 999px; color: #EAF3DE; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: background 0.15s; }
.review-btn:hover { background: #27500A; }
.section-label { font-size: 11px; color: #97C459; font-weight: 600; margin-bottom: 10px; }

.map-road-h { position: absolute; left: 0; right: 0; background: #d0e8bc; }
.map-road-v { position: absolute; top: 0; bottom: 0; background: #d0e8bc; }
.map-block { position: absolute; background: #c5dda3; border-radius: 6px; opacity: 0.55; }
.map-pin { position: absolute; transform: translate(-50%,-50%); cursor: pointer; }
.map-pin circle { transition: fill 0.15s, stroke 0.15s; }
</style>
</head>
<body>

<div class="browser-header">
  <div class="logo-row">
    <svg width="32" height="32" viewBox="0 0 64 64"><path d="M10 28 Q10 54 32 54 Q54 54 54 28 Z" fill="#3B6D11"/><ellipse cx="32" cy="28" rx="22" ry="6" fill="#97C459"/><ellipse cx="32" cy="28" rx="15" ry="4" fill="#C0DD97"/><ellipse cx="32" cy="55" rx="10" ry="3" fill="#3B6D11" opacity="0.2"/></svg>
    <div><div class="wordmark">matcha<span>map</span></div><div class="tagline">find the best matcha in your city</div></div>
  </div>
  <div class="nav-links">
    <div class="nav-link active" onclick="showPanel('nearby')">Map</div>
    <div class="nav-link" onclick="showPanel('list')">List</div>
    <div class="nav-link" onclick="showPanel('rankings')">Rankings</div>
    <button class="nav-cta" onclick="showPanel('nearby')">+ Add review</button>
  </div>
</div>

<div class="search-bar">
  <div class="search-pill">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4" stroke="#97C459" stroke-width="1.5"/><line x1="10" y1="10" x2="14" y2="14" stroke="#97C459" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input type="text" placeholder="Search city or neighbourhood..." value="Toronto, ON"/>
  </div>
  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" onclick="filterCafes('all',this)">All</button>
    <button class="filter-btn" onclick="filterCafes('ceremonial',this)">Ceremonial</button>
    <button class="filter-btn" onclick="filterCafes('latte',this)">Latte</button>
    <button class="filter-btn" onclick="filterCafes('iced',this)">Iced</button>
    <button class="filter-btn" onclick="filterCafes('dessert',this)">Dessert</button>
  </div>
</div>

<div class="main">
  <div class="map-container" id="mapContainer">
    <svg id="mapSvg" width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
      <rect width="800" height="600" fill="#e8f4df"/>
      <line x1="0" y1="150" x2="800" y2="150" stroke="#C0DD97" stroke-width="1"/>
      <line x1="0" y1="300" x2="800" y2="300" stroke="#C0DD97" stroke-width="1"/>
      <line x1="0" y1="450" x2="800" y2="450" stroke="#C0DD97" stroke-width="1"/>
      <line x1="200" y1="0" x2="200" y2="600" stroke="#C0DD97" stroke-width="1"/>
      <line x1="400" y1="0" x2="400" y2="600" stroke="#C0DD97" stroke-width="1"/>
      <line x1="600" y1="0" x2="600" y2="600" stroke="#C0DD97" stroke-width="1"/>
      <rect x="0" y="138" width="800" height="24" fill="#d0e8bc" opacity="0.8"/>
      <rect x="0" y="358" width="800" height="20" fill="#d0e8bc" opacity="0.8"/>
      <rect x="188" y="0" width="20" height="600" fill="#d0e8bc" opacity="0.8"/>
      <rect x="488" y="0" width="22" height="600" fill="#d0e8bc" opacity="0.8"/>
      <rect x="20" y="20" width="155" height="110" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="220" y="20" width="240" height="110" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="515" y="20" width="270" height="100" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="20" y="170" width="150" height="120" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="220" y="170" width="240" height="80" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="515" y="170" width="260" height="100" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="20" y="320" width="155" height="90" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="220" y="320" width="240" height="120" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="515" y="320" width="270" height="110" rx="6" fill="#c5dda3" opacity="0.5"/>
      <rect x="20" y="470" width="740" height="110" rx="6" fill="#c5dda3" opacity="0.4"/>
    </svg>
    <div id="mapPins"></div>
    <div class="map-tooltip" id="mapTip"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" id="tab-nearby" onclick="showPanel('nearby')">Nearby</div>
      <div class="sidebar-tab" id="tab-rankings" onclick="showPanel('rankings')">Rankings</div>
    </div>
    <div class="sidebar-content" id="sidebarContent"></div>
  </div>
</div>

<script>
const cafes = [
  { id:0, name:"Cha-An Toronto", type:"Japanese tea house", rating:4.8, google:4.7, appRating:4.9, votes:142, distance:"0.3 km", price:"$$", drinks:["ceremonial","matcha latte","cold brew matcha"], tags:["ceremonial","latte"], px:22, py:28 },
  { id:1, name:"Nami Japanese", type:"Café & restaurant", rating:4.6, google:4.5, appRating:4.7, votes:98, distance:"0.8 km", price:"$$", drinks:["matcha latte","iced matcha","matcha cake"], tags:["latte","iced","dessert"], px:52, py:52 },
  { id:2, name:"Kissa Tanto", type:"Japanese-French café", rating:4.7, google:4.8, appRating:4.6, votes:211, distance:"1.1 km", price:"$$$", drinks:["ceremonial","matcha tiramisu","iced hojicha"], tags:["ceremonial","dessert"], px:72, py:22 },
  { id:3, name:"Hoji Café", type:"Specialty tea café", rating:4.5, google:4.4, appRating:4.6, votes:76, distance:"1.4 km", price:"$", drinks:["iced matcha","matcha lemonade","matcha soft serve"], tags:["iced","dessert"], px:38, py:72 },
  { id:4, name:"Umami Mart Café", type:"Japanese grocery & café", rating:4.4, google:4.3, appRating:4.5, votes:54, distance:"1.9 km", price:"$", drinks:["matcha latte","matcha mochi","ceremonial"], tags:["latte","ceremonial","dessert"], px:82, py:68 },
];

let activePin = null;
let activeFilter = 'all';

function bowlSvg(s) {
  return `<svg width="${s}" height="${s}" viewBox="0 0 64 64"><path d="M10 28 Q10 54 32 54 Q54 54 54 28 Z" fill="#3B6D11"/><ellipse cx="32" cy="28" rx="22" ry="6" fill="#97C459"/><ellipse cx="32" cy="28" rx="15" ry="4" fill="#C0DD97"/></svg>`;
}

function renderPins(filter) {
  const container = document.getElementById('mapPins');
  container.innerHTML = '';
  cafes.forEach(c => {
    const visible = filter === 'all' || c.tags.includes(filter);
    const pin = document.createElement('div');
    pin.className = 'map-pin';
    pin.dataset.i = c.id;
    pin.style.cssText = `position:absolute;left:${c.px}%;top:${c.py}%;transform:translate(-50%,-50%);cursor:pointer;`;
    pin.innerHTML = `<div style="width:46px;height:46px;border-radius:50%;background:${activePin===c.id?'#EAF3DE':'#fff'};border:2.5px solid ${activePin===c.id?'#27500A':'#3B6D11'};display:flex;align-items:center;justify-content:center;transition:all 0.15s;opacity:${visible?1:0.3};">${bowlSvg(22)}</div>`;
    pin.addEventListener('click', e => { e.stopPropagation(); togglePin(c.id); });
    container.appendChild(pin);
  });
}

function togglePin(i) {
  if (activePin === i) { closeTip(); return; }
  activePin = i;
  renderPins(activeFilter);
  const c = cafes[i];
  const tip = document.getElementById('mapTip');
  tip.innerHTML = `<div class="tip-name">${c.name}</div><div class="tip-type">${c.type}</div><div class="tip-rating">★ ${c.rating} · ${c.distance}</div><div class="tip-tags">${c.drinks.map(d=>`<span class="tip-tag">${d}</span>`).join('')}</div>`;
  const container = document.getElementById('mapContainer');
  const rect = container.getBoundingClientRect();
  let left = (c.px / 100) * rect.width + 28;
  let top = (c.py / 100) * rect.height - 100;
  if (left + 180 > rect.width) left = left - 210;
  if (top < 8) top = (c.py / 100) * rect.height + 28;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
  tip.classList.add('show');
}

function closeTip() {
  activePin = null;
  renderPins(activeFilter);
  document.getElementById('mapTip').classList.remove('show');
}

document.getElementById('mapContainer').addEventListener('click', () => closeTip());
document.addEventListener('click', e => { if (!e.target.closest('#mapContainer')) closeTip(); });

function filterCafes(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPins(f);
  renderNearby(f);
}

function renderNearby(filter) {
  const f = filter || activeFilter;
  const filtered = f === 'all' ? cafes : cafes.filter(c => c.tags.includes(f));
  return filtered.map((c,i) => `
    <div class="cafe-card${i===0&&f==='all'?' featured':''}" onclick="togglePin(${c.id})">
      <div class="cafe-card-top">
        <div><div class="cafe-name">${c.name}</div><div class="cafe-type">${c.type}</div></div>
        <div class="cafe-badge">★ ${c.rating}</div>
      </div>
      <div class="cafe-meta"><span class="meta-pill">${c.distance}</span><span class="meta-pill">${c.price}</span><span class="meta-pill">Google ${c.google}</span></div>
      <div class="drink-tags">${c.drinks.map(d=>`<span class="drink-tag">${d}</span>`).join('')}</div>
    </div>`).join('') || '<p style="color:#97C459;font-size:13px;padding:1rem 0;">No cafés found for this filter.</p>';
}

function renderRankings() {
  return `<p class="section-label">Combined score · app reviews + Google ratings</p>` +
    [...cafes].sort((a,b)=>b.appRating-a.appRating).map((c,i) => {
      const score = ((c.google+c.appRating)/2).toFixed(1);
      const pct = Math.round((score/5)*100);
      return `<div class="rank-card">
        <div class="rank-num${i<3?' top':''}">#${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${c.name}</div>
          <div class="rank-sub">${c.votes} reviews · ${c.type}</div>
          <div class="rank-bar"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="rank-score">${score}</div>
      </div>`;
    }).join('') + `<button class="review-btn">+ add a review</button>`;
}

function showPanel(panel) {
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const content = document.getElementById('sidebarContent');
  if (panel === 'rankings') {
    document.getElementById('tab-rankings').classList.add('active');
    content.innerHTML = renderRankings();
  } else {
    document.getElementById('tab-nearby').classList.add('active');
    content.innerHTML = renderNearby();
  }
  document.querySelectorAll('.nav-link').forEach(l => { if (l.textContent.toLowerCase().includes(panel === 'rankings' ? 'rank' : 'map')) l.classList.add('active'); });
}

renderPins('all');
showPanel('nearby');
</script>
</body>
</html>
